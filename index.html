<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Code Generator</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <script src="script.js"></script>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
  <h1>QR Code Generator</h1>
  
  <!-- Text/URL input -->
  <input type="text" id="text" placeholder="Enter text or URL" />
  <br />
  
  <!-- Filename input -->
  <input type="text" id="filename" placeholder="Enter file name (optional)" />
  <br />

  <!-- QR output -->
  <div id="qrcode"></div>
  
  <!-- Buttons -->
  <button class="btn generate" onclick="generateQRCode()">Generate QR</button> <br>
  <button class="btn download" onclick="downloadQRCode()">Download QR</button>
</div>
</body>
</html>
